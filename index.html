<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ربط صفحة Facebook</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  :root {
    --blue: #1877F2;
    --blue-dark: #0f5ecb;
    --green: #16a34a;
    --bg: #f0f2f5;
    --white: #ffffff;
    --text: #1c1e21;
    --muted: #65676b;
    --border: #dadde1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--white);
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .logo {
    width: 64px;
    height: 64px;
    background: var(--blue);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 32px;
  }

  h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  .steps {
    background: #f8f9fa;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 32px;
    text-align: right;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    font-size: 14px;
    color: var(--text);
  }

  .step:not(:last-child) {
    border-bottom: 1px solid var(--border);
  }

  .step-num {
    width: 28px;
    height: 28px;
    background: var(--blue);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .btn-connect {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px 24px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-connect:hover  { background: var(--blue-dark); }
  .btn-connect:active { transform: scale(0.98); }

  .btn-connect svg {
    width: 22px;
    height: 22px;
    fill: white;
    flex-shrink: 0;
  }

  .security {
    margin-top: 20px;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .security::before {
    content: '🔒';
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">🤖</div>

  <h1>ربط صفحة Facebook</h1>
  <p class="subtitle">
    اربط صفحتك التجارية في ثوانٍ<br>
    دون مشاركة أي كلمة مرور أو بيانات شخصية
  </p>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <span>اضغط الزر أدناه — ستفتح نافذة Facebook رسمية</span>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <span>اختر الصفحة التي تريد ربطها</span>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <span>اضغط موافق — يتم الربط تلقائياً ✅</span>
    </div>
  </div>

  <button class="btn-connect" onclick="connectFacebook()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
    </svg>
    ربط صفحة Facebook
  </button>

  <p class="security">Facebook يتحقق من هويتك — نحن لا نرى كلمة مرورك</p>
</div>

<script>
  // ══════════════════════════════════════════
  // غيّر هذه القيم فقط
  const APP_ID       = 'YOUR_APP_ID';
  const REDIRECT_URI = 'https://YOUR_N8N_DOMAIN/webhook/fb-callback';
  // ══════════════════════════════════════════

  const SCOPE = [
    'pages_messaging',
    'pages_manage_metadata',
    'pages_read_engagement',
    'pages_show_list'
  ].join(',');

  function connectFacebook() {
    const url = 'https://www.facebook.com/dialog/oauth'
      + '?client_id='     + APP_ID
      + '&redirect_uri='  + encodeURIComponent(REDIRECT_URI)
      + '&scope='         + SCOPE
      + '&response_type=code'
      + '&auth_type=rerequest';

    window.open(url, 'fb_oauth', 'width=600,height=700,left=400,top=100');
  }
</script>

</body>
</html>

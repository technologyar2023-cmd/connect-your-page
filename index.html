<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ربط صفحة Facebook</title>
</head>

<body>

<button onclick="connectFacebook()">ربط صفحة Facebook</button>
<div id="status"></div>

<script>
  const APP_ID   = '3164834813697895';
  const N8N_HOOK = 'https://yacinee3.app.n8n.cloud/webhook/fb-oauth';
  const SCOPE    = 'pages_messaging,pages_manage_metadata,pages_read_engagement,pages_show_list';

  window.fbAsyncInit = function() {
    FB.init({
      appId  : APP_ID,
      cookie : true,
      xfbml  : true,
      version: 'v25.0'
    });
  };

  (function(d, s, id) {
    var js, fjs = d.getElementsByTagName(s)[0];
    if (d.getElementById(id)) return;
    js = d.createElement(s); js.id = id;
    js.src = "https://connect.facebook.net/en_US/sdk.js";
    fjs.parentNode.insertBefore(js, fjs);
  }(document, 'script', 'facebook-jssdk'));

  function setStatus(msg) {
    document.getElementById('status').innerText = msg;
  }

  function connectFacebook() {
    setStatus('جاري الاتصال...');

    FB.login(function(response) {
      console.log('LOGIN RESPONSE:', response);

      if (response.authResponse) {
        const userToken = response.authResponse.accessToken;

        setStatus('جاري جلب الصفحات...');

        FB.api('/me/accounts', {
          access_token: userToken,
          fields: 'id,name,access_token,category'
        }, function(pages) {

          console.log('PAGES:', pages);

          if (!pages || pages.error || !pages.data || pages.data.length === 0) {
            setStatus('❌ لم يتم العثور على صفحات');
            return;
          }

          const page = pages.data[0];

          setStatus('جاري الإرسال إلى n8n...');

          fetch(N8N_HOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              page_id: page.id,
              page_name: page.name,
              page_token: page.access_token,
              page_category: page.category,
              connected_at: new Date().toISOString()
            })
          })
          .then(res => res.json())
          .then(data => {
            console.log('N8N RESPONSE:', data);
            setStatus('✅ تم الربط بنجاح: ' + page.name);
          })
          .catch(err => {
            console.error(err);
            setStatus('⚠️ تم الربط لكن فشل الإرسال لـ n8n');
          });

        });

      } else {
        setStatus('❌ تم إلغاء تسجيل الدخول');
      }

    }, {
      scope: SCOPE,
      auth_type: 'rerequest',
      return_scopes: true
    });
  }
</script>

</body>
</html>
